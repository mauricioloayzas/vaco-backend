mead-recipe-create:
  handler: services/mead-recipe/create.php
  runtime: php-84
  description: "Crea un nuevo usuario"
  events:
    - httpApi:
        method: POST
        path: /mead-recipe
        authorizer: cognitoAuthorizer

mead-recipe-choose-brix:
  handler: services/mead-recipe/choose-brix.php
  runtime: php-84
  description: "Calcula opciones de mosto según kg de miel"
  events:
    - httpApi:
        method: POST
        path: /mead-recipe/choose-brix
        authorizer: cognitoAuthorizer
